<footer class="site-footer-wrap">
  <div class="container-md site-footer">
    <div class="row">
      <div class="col-12 text-center">

        <ul class="list-inline footer-links" role="list">

          {% if site.social-network-links.google-scholar %}
          <li class="list-inline-item">
            <a class="footer-icon-link" href="{{ site.social-network-links.google-scholar }}" target="_blank" aria-label="Google Scholar">
              <span class="fa-stack" aria-hidden="true">
                <i class="fas fa-circle fa-stack-2x"></i>
                <i class="ai ai-google-scholar fa-stack-1x fa-inverse" style="font-size: 1.5em; line-height: 1.35em;"></i>
              </span>
            </a>
          </li>
          {% endif %}

          {% if site.social-network-links.linkedin %}
          <li class="list-inline-item">
            <a class="footer-icon-link" href="{{ site.social-network-links.linkedin }}" target="_blank" aria-label="LinkedIn">
              <span class="fa-stack" aria-hidden="true">
                <i class="fas fa-circle fa-stack-2x"></i>
                <i class="fab fa-linkedin-in fa-stack-1x fa-inverse" style="font-size: 1.15em;"></i>
              </span>
            </a>
          </li>
          {% endif %}
          
        </ul>

        <p class="site-footer-text">
          {% if site.author %}{{ site.author }} · {% endif %}
          {{ 'now' | date: "%Y" }}
        </p>

      </div>
    </div>
  </div>
</footer>
